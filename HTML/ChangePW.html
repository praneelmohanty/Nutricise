<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password | Nutricise</title>
    <link rel="stylesheet" href="../CSS/Login-page.css" />
    <link rel="icon" type="image/x-icon" href="../Images/Logo.png" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <script src="../Javascript/ChangePW.js" defer></script>
  </head>
  <body>
    <div id="logo-div">
      <a href="../index.html"><img src="../Images/Logo-black website.png" /></a>
    </div>
    <div class="form-box">
      <form id="changePWForm" action="../Php/ChangePW.php" method="post">
        <h2>Change Password</h2>

        <div class="use-pass">
          <input
            name="current_password"
            type="password"
            placeholder="Current Password"
            required
            id="currentPassword"
          />
          <span class="eye" onclick="togglePassword('currentPassword', 'eye1')">
            <i style="cursor: pointer" id="eye1" class="bx bx-hide"></i>
          </span>
        </div>

        <div class="use-pass">
          <input
            name="new_password"
            type="password"
            placeholder="New Password"
            required
            id="newPassword"
          />
          <span class="eye" onclick="togglePassword('newPassword', 'eye2')">
            <i style="cursor: pointer" id="eye2" class="bx bx-hide"></i>
          </span>
        </div>

        <div class="use-pass">
          <input
            name="confirm_password"
            type="password"
            placeholder="Confirm New Password"
            required
            id="confirmPassword"
          />
          <span class="eye" onclick="togglePassword('confirmPassword', 'eye3')">
            <i style="cursor: pointer" id="eye3" class="bx bx-hide"></i>
          </span>
        </div>

        <button type="submit" class="btn">CHANGE PASSWORD</button>
        <p
          id="error-message"
          style="color: red; display: none; text-align: center"
        ></p>
      </form>

      <div class="register-link">
        <p>
          <a href="javascript:history.back()">Previous Page</a>
        </p>
      </div>
    </div>
  </body>
</html>
